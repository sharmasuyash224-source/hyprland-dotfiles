# ==================================
# General
# ==================================

general {
    disable_loading_bar = true
    hide_cursor = false
}

# ==================================
# Background
# ==================================

background {
    monitor =
    path = screenshot

    blur_passes = 4
    blur_size = 8

    noise = 0.015
    contrast = 1.1
    brightness = 0.85

    vibrancy = 0.25
    vibrancy_darkness = 0.2
}

# ==================================
# Clock
# ==================================

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"

    color = rgb(205,214,244)

    font_size = 96
    font_family = JetBrainsMono Nerd Font

    position = 0, 140
    halign = center
    valign = center
}

# ==================================
# Date
# ==================================

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"

    color = rgb(186,194,222)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 65
    halign = center
    valign = center
}

# ==================================
# Username
# ==================================

label {
    monitor =
    text = ब्राह्मण सर्वोपरि

    color = rgb(137,180,250)

    font_size = 28
    font_family = Noto Sans Devanagari
    position = 0, 260
    halign = center
    valign = center
} 


# ==================================
# Music
# ==================================

label {
    monitor =
    text = cmd[update:1] ~/.config/hypr/scripts/lockscreen-music.sh

    color = rgba(0, 255, 85, 0.84)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, -40
    halign = center
    valign = center
}

# ==================================
# Password Field
# ==================================

input-field {
    monitor =

    size = 320, 40

    outline_thickness = 2

    outer_color = rgb(137,180,250)
    inner_color = rgba(30,30,46,0.45)

    font_color = rgb(205,214,244)

    check_color = rgb(166,227,161)
    fail_color = rgb(243,139,168)

    fade_on_empty = false

    rounding = 18

    placeholder_text = Password

    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true

    position = 0, -120
    halign = center
    valign = center
}

# ==================================
# Status Text
# ==================================

label {
    monitor =
    text = राम राम, सुयश ब्राह्मण जी
    color = rgba(186,194,222,0.75)

    font_size = 26
    font_family = Noto Sans Devanagari
    position = 0, -200
    halign = center
    valign = center
}